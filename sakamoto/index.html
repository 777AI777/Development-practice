<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orbit Tasks</title>
    <!-- Reason: Distinct visual identity without external dependencies. -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orbit" aria-hidden="true"></div>

    <header class="hero">
      <div class="hero__content">
        <p class="eyebrow">Team Flow / 10 Users</p>
        <h1>Orbit Tasks</h1>
        <p class="subtitle">タスクをスマートに集めて、すぐに動ける状態へ。</p>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <div class="panel__header">
          <h2>新規タスク</h2>
          <button class="ghost" id="resetBtn" type="button">リセット</button>
        </div>
        <form id="taskForm" class="form" autocomplete="off">
          <label>
            タイトル
            <input type="text" id="title" name="title" placeholder="例: 進捗共有ミーティング" required />
          </label>
          <label>
            詳細
            <textarea id="details" name="details" rows="3" placeholder="目的、準備物、期待する成果など"></textarea>
          </label>
          <label>
            時間
            <input type="datetime-local" id="time" name="time" />
          </label>
          <label>
            場所
            <input type="text" id="location" name="location" placeholder="例: 4F 会議室 / Zoom" />
          </label>
          <label>
            担当者
            <input type="text" id="assignee" name="assignee" placeholder="例: 佐藤 / デザイン" />
          </label>
          <label>
            その他リンク
            <input type="url" id="link" name="link" placeholder="https://" />
          </label>
          <div class="form__actions">
            <button type="submit" class="primary" id="submitBtn">追加する</button>
            <button type="button" class="secondary" id="cancelEditBtn">編集キャンセル</button>
          </div>
          <input type="hidden" id="editId" />
        </form>
      </section>

      <section class="panel panel--wide">
        <div class="panel__header">
          <h2>タスク一覧</h2>
          <div class="filters">
            <input type="search" id="search" placeholder="検索: タイトル・担当者・場所" />
            <select id="filter">
              <option value="all">すべて</option>
              <option value="active">進行中</option>
              <option value="done">完了</option>
            </select>
            <select id="sort">
              <option value="created">作成順</option>
              <option value="time">時間順</option>
              <option value="assignee">担当者順</option>
            </select>
          </div>
        </div>
        <div id="taskList" class="task-grid" aria-live="polite"></div>
        <p id="emptyState" class="empty">まだタスクがありません。左のフォームから追加できます。</p>
      </section>
    </main>

    <footer class="footer">
      <p>Orbit Tasks &mdash; シンプルに、見える化。</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
