<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>プロジェクト | タスク管理</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>プロジェクト</h1>
      <nav>
        <a href="/teams.html">チーム</a>
        <a href="/projects.html" class="active">プロジェクト</a>
      </nav>
    </header>
    <main class="page">
      <section class="card">
        <h2>プロジェクト一覧</h2>
        <ul id="project-list" class="list"></ul>
      </section>
      <section class="card">
        <h2>プロジェクト作成</h2>
        <form id="project-form" class="form">
          <label>
            名前
            <input type="text" name="name" required />
          </label>
          <label>
            説明
            <textarea name="description" rows="3"></textarea>
          </label>
          <button type="submit">作成</button>
        </form>
      </section>
    </main>
    <script src="common.js"></script>
    <script src="projects.js"></script>
  </body>
</html>
